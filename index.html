<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>打卡成功</title>
    <style>
      body {
        background: white;
        font-size: 40px;
        text-align: center;
        margin-top: 100px;
        font-family: Arial, sans-serif;
      }
      .star {
        color: gold;
        animation: blink 1s infinite alternate;
      }
      @keyframes blink {
        from { opacity: 1; }
        to { opacity: 0.3; }
      }
    </style>
  <script>	
// 自動跳轉，避免重複打卡	
setTimeout(function() {	
window.location.href = "about:blank";	
}, 5000); // 5秒後跳轉	
</script>	
</head>	
<body>	
<div class="stars">✨✨</div>	
<h1>打卡成功！</h1>	
<div class="info">您好，<?= name ?>！</div>	
<div class="time">打卡時間：<?= time ?></div>	
<div class="status">狀態：<?= status ?>（<?= classType ?>）</div>	
<div class="count">今天第 <?= count ?> 次打卡</div>	
</body>	
</html>
