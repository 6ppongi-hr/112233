<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>打卡成功</title>
    <style>
      body {
        background: white;
        font-size: 40px;
        text-align: center;
        margin-top: 100px;
        font-family: Arial, sans-serif;
      }
      .star {
        color: gold;
        animation: blink 1s infinite alternate;
      }
      @keyframes blink {
        from { opacity: 1; }
        to { opacity: 0.3; }
      }
    </style>
  </head>
  <body>
    🎉 <span class="star">打卡成功！</span><br><br>
    請確認您的畫面已顯示此頁面
  </body>
</html>
