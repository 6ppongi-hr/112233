<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>打卡成功</title>
    <style>
      body {
        background-color: white;
        font-family: sans-serif;
        text-align: center;
        padding-top: 50px;
      }
      h1 {
        font-size: 4em;
        color: green;
      }
      .info {
        font-size: 2em;
        margin-top: 20px;
      }
      .star {
        font-size: 3em;
        animation: twinkle 1s infinite;
      }
      @keyframes twinkle {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
    </style>
  </head>
  <body>
    <div class="star">✨</div>
    <h1>打卡成功！</h1>
    <div class="info" id="name"></div>
    <div class="info" id="time"></div>
    <div class="info" id="status"></div>

    <script>
      const params = new URLSearchParams(window.location.search);
      document.getElementById("name").innerText = "您好，" + (params.get("name") || "未知") + "！";
      document.getElementById("time").innerText = "打卡時間：" + (params.get("time") || "未提供");
      document.getElementById("status").innerText = "狀態：" + (params.get("status") || "未提供");
    </script>
  </body>
</html>
