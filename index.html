<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>打卡中...</title>
    <script>
      const params = new URLSearchParams(window.location.search);
      const uid = params.get("uid");

      if (uid) {
        window.location.href = `https://script.google.com/macros/s/你的部署ID/exec?uid=${uid}`;
      } else {
        document.body.innerHTML = "⚠️ 無法取得 UID，請重新掃描 NFC。";
      }
    </script>
  </head>
  <body>
    <p>正在打卡，請稍候...</p>
  </body>
</html>
