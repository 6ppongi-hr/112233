<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>正在跳轉...</title>
  <script>
    function getQueryParam(param) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(param);
    }

    const uid = getQueryParam("uid");
    if (!uid) {
      document.body.innerHTML = "錯誤：缺少 UID";
    } else {
      const redirectUrl = `https://script.google.com/macros/s/AKfycbxoWa1odxhjAMO9VEoSWYN8BvdOK0kQk3Dfogs00cF2a7foy8DRYyxuahoU3T4pAuCotQ/exec?uid=${encodeURIComponent(uid)}`;
      window.location.href = redirectUrl;
    }
  </script>
</head>
<body>
  正在跳轉，請稍候...
</body>
</html>
